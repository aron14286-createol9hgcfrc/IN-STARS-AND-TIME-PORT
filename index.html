<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="user-scalable=no">
    <base href="https://cdn.jsdelivr.net/gh/web-ports/in-stars-and-time@3a5cc49c0cbbefa7740c5bb88eb196ee089fd3b0/">
    <link rel="icon" href="icon/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon/icon.png">
    <link rel="stylesheet" type="text/css" href="fonts/gamefont.css">
    <title>IN STARS AND TIME v1.0.6.3</title>
</head>
<body style="background-color: black; margin: 0; padding: 0;">

    <!-- Game Libraries -->
    <script src="js/libs/pixi.js"></script>
    <script src="js/libs/pixi-tilemap.js"></script>
    <script src="js/libs/pixi-picture.js"></script>
    <script src="js/libs/fpsmeter.js"></script>
    <script src="js/libs/lz-string.js"></script>
    <script src="js/libs/iphone-inline-video.browser.js"></script>
    
    <!-- RPG Core -->
    <script src="js/rpg_core.js"></script>
    <script src="js/rpg_managers.js"></script>
    <script src="js/rpg_objects.js"></script>
    <script src="js/rpg_scenes.js"></script>
    <script src="js/rpg_sprites.js"></script>
    <script src="js/rpg_windows.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Auto-resize canvas to fit screen
        function resizeCanvas() {
            const canvas = document.querySelector("#GameCanvas");
            const video = document.querySelector("#GameVideo");
            const upper = document.querySelector("#UpperCanvas");
            
            if (!canvas) return;
            
            let w = window.innerWidth;
            let h = window.innerHeight;
            
            // 4:3 aspect ratio
            if ((w * 0.75) > h) {
                w = Math.floor((h / 3) * 4);
            } else {
                h = Math.floor((w / 4) * 3);
            }
            
            if (canvas) {
                canvas.style.width = w + "px";
                canvas.style.height = h + "px";
            }
            if (video) {
                video.style.width = w + "px";
                video.style.height = h + "px";
            }
            if (upper) {
                upper.style.width = w + "px";
                upper.style.height = h + "px";
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        setTimeout(resizeCanvas, 100);
    </script>

</body>
</html>
