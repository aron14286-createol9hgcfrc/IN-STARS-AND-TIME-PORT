  <script>
    function applycanvasmode() {
      const canvas = document.querySelector("#GameCanvas");
      const video = document.querySelector("#GameVideo");
      const upper = document.querySelector("#UpperCanvas");
      if (!canvas) return;
      let maxW = window.innerWidth;
      let maxH = window.innerHeight;
      let w, h;
      if ((maxW * 0.75) > maxH) {
        h = maxH;
        w = Math.floor((maxH / 3) * 4);
      } else {
        w = maxW;
        h = Math.floor((maxW / 4) * 3);
      }
      [canvas, video, upper].forEach(el => {
        if (el) {
          el.style.width = w + "px";
          el.style.height = h + "px";
        }
      });
    }
    setInterval(applycanvasmode, 100);

    (function() {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (!isMobile) return;
      const i = setInterval(() => {
        if (window.fullSetupComplete && window.nipplejs && window.fakeInput) {
          const zone = document.createElement("div");
          zone.style = "position: fixed; bottom: 0; left: 0; z-index: 9999; width: 200px; height: 200px;";
          document.body.appendChild(zone);
          nipplejs.create({ zone, mode: 'static', position: { left: '100px', bottom: '100px' }, color: 'white' })
            .on("dir", (e, data) => {
              ["up", "down", "left", "right"].forEach(d => d === data.direction.angle ? fakeInput.down(d) : fakeInput.up(d));
            })
            .on("end", () => {
              ["up", "down", "left", "right"].forEach(d => fakeInput.up(d));
            });
          clearInterval(i);
        }
      }, 100);
    })();

    fetch("data/Translations.json").then(res => res.json()).then(json => {
      window.$dataTranslations = json;
    });
  </script>
</body>
